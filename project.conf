# ============================================================
#  project.conf — Configuración del proyecto de documentación
#  Editar este archivo para adaptar el template a un nuevo proyecto
# ============================================================

[project]
name        = MyProject                        # Nombre corto del proyecto
full_name   = Sistema MyProject                # Nombre completo
institution = Mi Institucion                   # Nombre de la organización
department  = Departamento de TI               # Área o departamento
language    = spanish                          # spanish | english | portuguese
version     = 1.0

[documents]
# Documentos a generar (se compilan con make)
technical_doc   = documentacion_tecnica        # nombre sin .tex
user_guide      = guia_usuario                 # nombre sin .tex

# Pies de página por documento
technical_footer = Documentación Técnica - MyProject
user_guide_footer = Guía de Usuario - MyProject

[colors]
# Colores institucionales en RGB
primary     = 0, 82, 155         # Azul corporativo (títulos, sección)
accent      = 255, 107, 0        # Naranja de acento (links, botones)
annotation  = 255, 0, 0          # Color de anotaciones en capturas (rojo)

[agent_skills]
# Configuración para el sistema de capturas automatizadas
base_url    = http://localhost:3000
login_url   = /login
# Ruta al .env con credenciales (NUNCA commitear)
env_file    = agent_skills/.env.docs
# Prefijo para los entornos LaTeX personalizados
env_prefix  = nota                             # genera \begin{notamyproject} etc.

[stack]
# Descripción del stack tecnológico (para prompts de IA)
backend     = Django REST Framework / Node.js
frontend    = React / Vue 3
database    = PostgreSQL
language    = Python / JavaScript
type        = web                              # web | mobile | api
